paths:
  data_dir: data
  models_dir: models
  uploads_dir: uploads
  outputs_dir: outputs
  reports_dir: reports

club_detection:
  enabled: true
  model_type: yolov8
  model_path: models/club_detector.pt
  confidence_threshold: 0.4
  categories:
    - driver_wood
    - hybrid
    - iron_wedge

pose_estimation:
  backend: mediapipe
  confidence_threshold: 0.5

club_recognition:
  yolo_model_path: models/club_detector.pt
  yolo_class_name:
  detector_confidence_threshold: 0.4
  confirm_threshold: 0.6
  wood_aspect_threshold: 1.15
  driver_area_threshold: 0.08
  fairway_area_threshold: 0.05
  ocr_backend: auto

metrics:
  smoothing_window: 5
  normalize_by: torso

feedback:
  driver_wood:
    spine_angle_range: [30, 45]
    head_movement_max_cm: 5
  hybrid:
    spine_angle_range: [25, 40]
    head_movement_max_cm: 4
  iron_wedge:
    spine_angle_range: [20, 35]
    head_movement_max_cm: 3

app:
  max_video_seconds: 12
  key_frame_stride: 3
  local_web_host: 127.0.0.1
  local_web_port: 8000
