paths:
  data_dir: data
  models_dir: models
  uploads_dir: uploads
  outputs_dir: outputs
  reports_dir: reports

club_detection:
  enabled: true
  model_type: yolov8
  model_path: models/club_detector.pt
  confidence_threshold: 0.4
  categories:
    - driver_wood
    - hybrid
    - iron_wedge

pose_estimation:
  backend: mediapipe
  confidence_threshold: 0.5

club_recognition:
  yolo_model_path: models/club_detector.pt
  yolo_class_name:
  detector_confidence_threshold: 0.4
  confirm_threshold: 0.6
  # Preferred live-capture classifier. The checkpoint stores the five class
  # labels: driver, wood, hybrid, iron, and wedge.
  five_way_cnn_model_path: models/trained/club_type_5way.pt
  five_way_cnn_min_confidence: 0.60
  # Stage 2 only when five-way detection returns Iron or Wedge. The marking
  # checkpoint reads 1-9, P/A/G/S/L, and wedge lofts such as 56.
  club_marking_cnn_model_path: models/trained/club_marking_cnn.pt
  club_marking_cnn_min_confidence: 0.60
  # Legacy fallback for an Iron-only numbers checkpoint.
  # Stage 1: class_names must be iron and wood (or one of the documented aliases).
  broad_cnn_model_path: models/trained/club_broad_cnn.pt
  broad_cnn_min_confidence: 0.55
  # Stage 2 for an iron: class_names 1 through 9.  The model sees the lower
  # center marking crop from the detected club head.
  iron_number_cnn_model_path: models/trained/club_iron_number_cnn.pt
  iron_number_cnn_min_confidence: 0.55
  # Stage 3 for a wood: class_names driver, wood, and hybrid.
  wood_type_cnn_model_path: models/trained/club_wood_type_cnn.pt
  wood_type_cnn_min_confidence: 0.55

metrics:
  smoothing_window: 5
  normalize_by: torso

# Gemini receives only local CV measurements by default—not the video, frames,
# file paths, or debug artifacts. Export GEMINI_API_KEY in the runtime environment.
gemini:
  enabled: true
  api_key_env: GEMINI_API_KEY
  # Gemini 3 Flash currently uses a pinned preview identifier.
  model: gemini-3-flash-preview
  timeout_seconds: 35
  # Includes room for Gemini 3 reasoning plus the full structured coaching result.
  max_output_tokens: 4096

preprocessing:
  adaptive_contrast: true
  adaptive_contrast_clip_limit: 2.0
  adaptive_contrast_tile_grid_size: [8, 8]

feedback:
  driver_wood:
    spine_angle_range: [30, 45]
    head_movement_max_cm: 5
  hybrid:
    spine_angle_range: [25, 40]
    head_movement_max_cm: 4
  iron_wedge:
    spine_angle_range: [20, 35]
    head_movement_max_cm: 3

app:
  max_video_seconds: 12
  key_frame_stride: 3
  local_web_host: 127.0.0.1
  local_web_port: 8000
